disk: ubuntu
resources:
  cpu: 1000m
  memory: 2048Mi
lifecycle:
  autoSuspendPolicy:
    enabled: true
    interval: 300
    mode: Memory          # full memory+disk snapshot on suspend
  autoDeletePolicy:
    enabled: true
    deleteIntervalInSeconds: 86400   # clean up after 24h
# Egress policy is applied separately in Act 4 via egress-policy.yaml
